<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelStrip — Image Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>

  <!-- Top Header Bar -->
  <header class="app-header">
    <div class="logo">
      <span class="logo-mark">Pixel</span>
      <span class="logo-text">Strip</span>
    </div>

    <div class="header-actions">
      <button class="btn btn-ghost" id="btn-new-canvas" title="New Image">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        New
      </button>
      <label class="btn btn-primary" id="upload-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Open Image
        <input type="file" id="file-input" accept="image/*" hidden />
      </label>

      <div class="export-group">
        <button class="btn btn-ghost" id="btn-export-png">PNG</button>
        <button class="btn btn-ghost" id="btn-export-jpg">JPG</button>
        <button class="btn btn-ghost" id="btn-export-ico">ICO</button>
      </div>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="app-body">
    <!-- Left Sidebar: Tools -->
    <aside class="sidebar-tools" id="sidebar-tools">
      <div class="tool-section">
        <span class="section-label">DRAW</span>
        <div class="tool-grid">
          <button class="tool-btn active" data-tool="pencil" title="Pencil (P)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
          </button>
          <button class="tool-btn" data-tool="brush" title="Brush (B)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.06 11.9l8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"/><path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1 1 2.48 1.02 3.5 1.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-2.5-3.02z"/></svg>
          </button>
          <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l9-9 8 8"/><path d="M6.5 17.5l5-5"/></svg>
          </button>
          <button class="tool-btn" data-tool="fill" title="Fill (F)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 11l-8-8-8.5 8.5a5.5 5.5 0 0 0 7.78 7.78L19 11z"/><path d="M20 23a2 2 0 0 0 2-2c0-1.1-.8-2-2-3a2 2 0 0 0-2 3c0 1.1.9 2 2 2z"/></svg>
          </button>
          <button class="tool-btn" data-tool="eyedropper" title="Color Picker (K)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 13.5V20h6.5l9-9"/><path d="M14.5 2.5l7 7-4 4-7-7z"/></svg>
          </button>
          <button class="tool-btn" data-tool="text" title="Text (T)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
          </button>
          <button class="tool-btn" data-tool="zoom" title="Zoom (Z)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
          <button class="tool-btn" data-tool="crop" title="Crop (C)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2v14a2 2 0 0 0 2 2h14"/><path d="M18 22V8a2 2 0 0 0-2-2H2"/></svg>
          </button>
        </div>
      </div>

      <div class="tool-section">
        <span class="section-label">SHAPES</span>
        <div class="tool-grid">
          <button class="tool-btn" data-tool="rect" title="Rectangle (R)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"/></svg>
          </button>
          <button class="tool-btn" data-tool="ellipse" title="Ellipse (O)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="6"/></svg>
          </button>
          <button class="tool-btn" data-tool="line" title="Line (L)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/></svg>
          </button>
        </div>
      </div>

      <div class="tool-section">
        <span class="section-label">COLOR</span>
        <div class="color-row">
          <div class="color-preview-wrap">
            <div class="color-swatch" id="swatch-fg" title="Foreground color"></div>
            <div class="color-swatch secondary" id="swatch-bg" title="Background color"></div>
          </div>
          <input type="color" id="color-fg" value="#ffdd00" />
        </div>
        <input type="color" id="color-bg" value="#ffffff" style="display:none" />
      </div>

      <div class="tolerance-wrap" id="tolerance-wrap">
        <span class="section-label">TOLERANCE</span>
        <div class="slider-wrap">
          <input type="range" id="fill-tolerance" min="0" max="255" value="32" class="slider" />
          <span class="slider-val" id="fill-tolerance-val">32</span>
        </div>
      </div>

      <div class="tool-section">
        <span class="section-label">SIZE</span>
        <div class="slider-wrap">
          <input type="range" id="brush-size" min="1" max="80" value="8" class="slider" />
          <span class="slider-val" id="brush-size-val">8px</span>
        </div>
      </div>

      <div class="tool-section">
        <span class="section-label">OPACITY</span>
        <div class="slider-wrap">
          <input type="range" id="brush-opacity" min="1" max="100" value="100" class="slider" />
          <span class="slider-val" id="brush-opacity-val">100%</span>
        </div>
      </div>

      
      <div class="tool-section">
        <span class="section-label">ANTI-ALIAS</span>
        <div class="toggle-row">
          <label class="toggle-label">
            <input type="checkbox" id="anti-alias" />
            <span>Enabled</span>
          </label>
        </div>
      </div>

      <div class="tool-section">
        <span class="section-label">SHAPE FILL</span>
        <div class="toggle-row">
          <label class="toggle-label">
            <input type="checkbox" id="shape-filled" />
            <span>Filled</span>
          </label>
        </div>
      </div>

      <div class="tool-section history-btns">
        <button class="btn btn-tool-action" id="btn-undo" title="Undo (Ctrl+Z)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
          Undo
        </button>
        <button class="btn btn-tool-action" id="btn-redo" title="Redo (Ctrl+Y)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
          Redo
        </button>
      </div>
    </aside>

    <div class="resize-handle" id="handle-left"></div>

    <!-- Canvas Area -->
    <main class="canvas-area" id="canvas-area">
      <div class="canvas-drop-zone" id="drop-zone">
        <div class="drop-hint" id="drop-hint">
          <div class="drop-icon">▣</div>
          <p class="drop-title">PixelStrip</p>
          <p class="drop-sub">Drop an image or <strong>Open Image</strong> above</p>
          <p class="drop-formats">PNG · JPG · WEBP · GIF</p>
          <div class="new-image-form">
            <div class="new-image-row">
              <div class="input-group">
                <label>W</label>
                <input type="number" id="new-img-w" value="800" min="1" max="8000" />
                <span class="unit-label">px</span>
              </div>
              <span class="new-image-x">×</span>
              <div class="input-group">
                <label>H</label>
                <input type="number" id="new-img-h" value="600" min="1" max="8000" />
                <span class="unit-label">px</span>
              </div>
            </div>
            <div class="new-image-row">
              <label class="new-image-label">Background</label>
              <div class="new-image-bg-opts">
                <button class="bg-opt active" data-bg="white" title="White">
                  <span class="bg-swatch" style="background:#ffffff; border: 1px solid #ccc"></span>
                  White
                </button>
                <button class="bg-opt" data-bg="black" title="Black">
                  <span class="bg-swatch" style="background:#000000"></span>
                  Black
                </button>
                <button class="bg-opt" data-bg="transparent" title="Transparent">
                  <span class="bg-swatch checker"></span>
                  Clear
                </button>
              </div>
            </div>
            <button class="btn btn-primary new-image-btn" id="btn-new-image">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
              New Image
            </button>
          </div>
        </div>
        <div class="canvas-wrapper" id="canvas-wrapper" style="display:none">
          <canvas id="main-canvas"></canvas>
          <canvas id="overlay-canvas"></canvas>
          
          <!-- <div id="text-input-container" style="display:none">
            <textarea id="text-input" placeholder="Type here..." rows="1" spellcheck="false"></textarea>
          </div> -->
          <textarea id="text-input" spellcheck="false" style="position:fixed;left:-9999px;top:-9999px;opacity:0;width:1px;height:1px;"></textarea>
        </div>
      </div>
    </main>

    <div class="resize-handle" id="handle-right"></div>

    <!-- Right Sidebar: Operations -->
    <aside class="sidebar-ops" id="sidebar-ops">

      <section class="ops-section">
        <h3 class="ops-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          Background
        </h3>
        <button class="btn btn-accent" id="btn-remove-bg">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          Remove Background
        </button>
        <div class="model-status" id="model-status">Model not loaded</div>
        <div class="progress-bar-wrap" id="progress-wrap" style="display:none">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </section>

      <section class="ops-section">
        <h3 class="ops-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
          Resize
        </h3>
        <div class="resize-inputs">
          <div class="input-group">
            <label>W</label>
            <input type="number" id="resize-w" placeholder="Width" min="1" />
            <span class="unit-label">px</span>
          </div>
          <button class="lock-btn" id="lock-aspect" title="Lock aspect ratio">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </button>
          <div class="input-group">
            <label>H</label>
            <input type="number" id="resize-h" placeholder="Height" min="1" />
            <span class="unit-label">px</span>
          </div>
        </div>
        <button class="btn btn-secondary" id="btn-resize">Apply Resize</button>
      </section>

      <section class="ops-section">
        <h3 class="ops-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </h3>
        <div class="export-options">
          <div class="input-group">
            <label>Quality</label>
            <input type="range" id="jpg-quality" min="1" max="100" value="100" class="slider" />
            <span class="slider-val" id="jpg-quality-val">100%</span>
          </div>
        </div>
        <div class="export-btns">
          <button class="btn btn-export" id="btn-export-png2">
            <span class="fmt-badge">PNG</span> Transparent
          </button>
          <button class="btn btn-export" id="btn-export-jpg2">
            <span class="fmt-badge">JPG</span> Compressed
          </button>
          <button class="btn btn-export" id="btn-export-ico2">
            <span class="fmt-badge">ICO</span> Icon File
          </button>
        </div>
      </section>

      <section class="ops-section">
        <h3 class="ops-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
          Canvas Info
        </h3>
        <div class="info-grid">
          <span class="info-label">Size</span>
          <span class="info-val" id="info-size">—</span>
          <span class="info-label">Zoom</span>
          <span class="info-val" id="info-zoom">100%</span>
          <span class="info-label">Tool</span>
          <span class="info-val" id="info-tool">pencil</span>
        </div>
        <div class="zoom-controls">
          <button class="btn btn-ghost sm" id="btn-zoom-out">−</button>
          <button class="btn btn-ghost sm" id="btn-zoom-fit">Fit</button>
          <button class="btn btn-ghost sm" id="btn-zoom-in">+</button>
        </div>
      </section>

      <section class="ops-section">
        <h3 class="ops-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>
          Transform
        </h3>
        <div class="transform-btns">
          <button class="btn btn-ghost sm" id="btn-flip-h">↔ Flip H</button>
          <button class="btn btn-ghost sm" id="btn-flip-v">↕ Flip V</button>
          <button class="btn btn-ghost sm" id="btn-rotate-l">↺ 90°</button>
          <button class="btn btn-ghost sm" id="btn-rotate-r">↻ 90°</button>
        </div>
      </section>

    </aside>

    <!-- Mobile bottom sheet -->
    <div class="mobile-tab-bar" id="mobile-tab-bar">
      <div class="mobile-sheet-handle" id="mobile-sheet-handle">
        <div class="mobile-sheet-pill"></div>
      </div>
      <div class="mobile-tabs">
        <button class="mobile-tab-btn active" data-tab="background">Background</button>
        <button class="mobile-tab-btn" data-tab="resize">Resize</button>
        <button class="mobile-tab-btn" data-tab="export">Export</button>
        <button class="mobile-tab-btn" data-tab="info">Info</button>
      </div>
      <div class="mobile-sheet-content" id="mobile-sheet-content">
        <!-- content injected by ui.js -->
      </div>
    </div>

    <!-- Mobile horizontal toolbar (phones) -->
    <div class="mobile-toolbar" id="mobile-toolbar" style="display:none">
      <!-- tool buttons cloned by ui.js -->
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <!-- Text tool font size -->
  <div class="floating-text-opts" id="text-opts" style="display:none">
    <select id="font-size-select">
      <option value="12">12px</option>
      <option value="16">16px</option>
      <option value="20">20px</option>
      <option value="28" selected>28px</option>
      <option value="36">36px</option>
      <option value="48">48px</option>
      <option value="64">64px</option>
      <option value="96">96px</option>
    </select>
  </div>

  <div class="floating-text-opts" id="crop-opts" style="display:none">
    <span class="crop-size-label" id="crop-size-label">800 × 600</span>
    <select id="crop-ratio" class="crop-ratio-select">
      <option value="free">Free</option>
      <option value="1:1">1 : 1</option>
      <option value="4:3">4 : 3</option>
      <option value="3:4">3 : 4</option>
      <option value="16:9">16 : 9</option>
      <option value="9:16">9 : 16</option>
      <option value="3:2">3 : 2</option>
      <option value="2:3">2 : 3</option>
      <option value="canvas">Canvas</option>
    </select>
    <button class="btn btn-primary" id="btn-crop-confirm">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2v14a2 2 0 0 0 2 2h14"/><path d="M18 22V8a2 2 0 0 0-2-2H2"/></svg>
      Crop
    </button>
    <button class="btn btn-ghost" id="btn-crop-cancel">Cancel</button>
  </div>

  <div id="cursor-circle"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
